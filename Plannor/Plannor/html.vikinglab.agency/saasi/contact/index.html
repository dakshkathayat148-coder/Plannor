                            <script>

                                function gen(){

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var status = params.get('status');
            if (status) {
                var alert = document.getElementById('form-alert');
                var inner = document.getElementById('form-alert-inner');
                if (status === 'success') {
                    inner.style.background = '#e6f9f0';
                    inner.style.color = '#1a7a4a';
                    inner.style.border = '1px solid #a3e6c8';
                    inner.innerHTML = '&#10003; Thank you! Your message has been received. We\'ll be in touch soon.';
                } else {
                    inner.style.background = '#fdecea';
                    inner.style.color = '#c0392b';
                    inner.style.border = '1px solid #f5c6cb';
                    inner.innerHTML = '&#10007; Something went wrong. Please try again.';
                }
                alert.style.display = 'block';
                window.scrollTo({ top: alert.offsetTop - 100, behavior: 'smooth' });
            }
        })();
    </script>
