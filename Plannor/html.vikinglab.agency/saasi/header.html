<!-- offcanvas menu start -->
<div class="vl-offcanvas">
    <div class="vl-offcanvas-wrapper">
        <div class="vl-offcanvas-header d-flex justify-content-between align-items-center mb-50">
            <div class="vl-offcanvas-logo">
                <a href="index.html"><img src="assets/img/logo/plannor-logomain1.png" alt="" style="max-height:45px;width:auto;"></a>
            </div>
            <div class="vl-offcanvas-close">
                <button class="vl-offcanvas-close-toggle"><i class="fa-regular fa-xmark"></i></button>
            </div>
        </div>
        <div class="vl-offcanvas-menu d-lg-block mb-40">
            <nav></nav>
        </div>
    </div>
</div>
<div class="vl-offcanvas-overlay"></div>
<!-- offcanvas menu end -->

<script>
(function () {
    // Open / close offcanvas via event delegation
    // (main.js binds too early  header is loaded async via includes.js)
    document.addEventListener('click', function (e) {
        if (e.target.closest('.vl-offcanvas-toggle')) {
            var oc = document.querySelector('.vl-offcanvas');
            var ol = document.querySelector('.vl-offcanvas-overlay');
            if (oc) oc.classList.add('vl-offcanvas-open');
            if (ol) ol.classList.add('vl-offcanvas-overlay-open');
        }
        if (e.target.closest('.vl-offcanvas-close-toggle') || e.target.classList.contains('vl-offcanvas-overlay')) {
            var oc = document.querySelector('.vl-offcanvas');
            var ol = document.querySelector('.vl-offcanvas-overlay');
            if (oc) oc.classList.remove('vl-offcanvas-open');
            if (ol) ol.classList.remove('vl-offcanvas-overlay-open');
        }
    });

    // Clone nav menu into offcanvas sidebar
    setTimeout(function () {
        var navUl = document.querySelector('.vl-mobile-menu-active > ul');
        var offcanvasNav = document.querySelector('.vl-offcanvas-menu nav');
        if (navUl && offcanvasNav && !offcanvasNav.querySelector('ul')) {
            var cloned = navUl.cloneNode(true);
            cloned.removeAttribute('style');
            Array.prototype.forEach.call(cloned.querySelectorAll('li'), function(li) {
                li.removeAttribute('style');
            });
            // Remove inline font-size/padding from cloned anchors
            Array.prototype.forEach.call(cloned.querySelectorAll('a'), function(a) {
                a.removeAttribute('style');
            });
            offcanvasNav.appendChild(cloned);

            // Add chevron toggle button for items with sub-menus
            Array.prototype.forEach.call(
                offcanvasNav.querySelectorAll('.has-dropdown'),
                function(li) {
                    var btn = document.createElement('button');
                    btn.className = 'vl-menu-close';
                    btn.type = 'button';
                    btn.innerHTML = '<i class="fas fa-chevron-right"></i>';
                    btn.style.cssText = 'position:absolute;right:0;top:4px;background:none;border:none;cursor:pointer;font-size:12px;color:#555;padding:4px 8px;';
                    li.style.position = 'relative';
                    li.appendChild(btn);
                }
            );

            // Submenu toggle  only the chevron button toggles, the link navigates normally
            offcanvasNav.addEventListener('click', function(e) {
                var btn = e.target.closest('.vl-menu-close');
                if (!btn) return;
                e.preventDefault();
                var li = btn.closest('.has-dropdown');
                var sub = li ? li.querySelector('.sub-menu') : null;
                if (!sub) return;
                if (li.classList.contains('active')) {
                    li.classList.remove('active');
                    sub.style.display = 'none';
                } else {
                    li.classList.add('active');
                    sub.style.display = 'block';
                }
            });
        }
    }, 0);
})();
</script>
