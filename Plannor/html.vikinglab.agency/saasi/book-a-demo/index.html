<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plannor - Book a Demo</title>

    <!-- fav logo -->
    <link rel="shortcut icon" href="../assets/img/logo/logofavicon.png" type="image/x-icon">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <!-- magnific-popup css -->
    <link rel="stylesheet" href="../assets/css/magnific-popup.css">
    <!-- swiper-bundle -->
    <link rel="stylesheet" href="../assets/css/swiper-bundle.min.css">
    <!-- nice-select -->
    <link rel="stylesheet" href="../assets/css/nice-select.css">
    <!-- aos -->
    <link rel="stylesheet" href="../assets/css/aos.css">
    <!-- fontawesome -->
    <link rel="stylesheet" href="../assets/css/fontawesome-pro.css">
    <!-- odometer -->
    <link rel="stylesheet" href="../assets/css/odometer-theme-default.min.css">
    <!-- style css -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <!-- preloader -->
    <div class="preloader">
        <div class="loading-container">
            <div class="loading"></div>
            <div id="loading-icon"><img src="../assets/img/preloader/vl-preloader-1.1.png" alt=""></div>
        </div>
    </div>

    <div id="global-header"></div>

    <main>
        <!-- =========== banner area start =========== -->
        <section class="vl-breadcrumb-area p-relative"
            style="background-image: linear-gradient(135deg, #3d1eb5 0%, #5932EA 50%, #772EFE 100%); display:flex; align-items:center; justify-content:center; padding-top:80px !important; padding-bottom:30px !important; min-height:400px;">
            <div class="container">
                <div class="row">
                    <div class="col-xl-6 mx-auto text-center">
                        <div class="vl-breadcrumb-content">
                            <h2 class="title mb-28">Book a Demo</h2>
                            <div class="vl-breadcrumb-menu">
                                <ul>
                                    <li><a href="../">Home</a></li>
                                    <li><i class="fa-regular fa-angle-right"></i></li>
                                    <li><a href="#">Book a Demo</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- =========== banner area end =========== -->

        <!-- =========== demo booking area start =========== -->
        <section class="vl-blog-area-iner-details vl-grey-color fix pt-100 pb-70" style="margin-top:0 !important;">
            <div class="container">
                <div class="row">
                    <div class="col-xl-7 col-md-8 mx-auto text-center">
                        <div class="vl-section-title mb-60">
                            <p class="sub-title mb-16"><span><img src="../assets/img/icon/sub-title-icon1.1.svg" alt=""></span> See Plannor In Action</p>
                            <h2 class="title">Book a Personalised Demo With Our Team</h2>
                            <p class="desc mt-14">Fill in the form below and one of our NDIS specialists will reach out to schedule a demo tailored to your organisation's needs.</p>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-xl-12">
                        <form id="demo-form">
                        <div class="vl-contact-inner-bg">
                            <div class="row">
                                <div class="col-xl-6 col-md-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>First Name*</label>
                                        <input type="text" placeholder="Enter First Name">
                                    </div>
                                </div>
                                <div class="col-xl-6 col-md-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Last Name*</label>
                                        <input type="text" placeholder="Enter Last Name">
                                    </div>
                                </div>
                                <div class="col-xl-6 col-md-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Email Address*</label>
                                        <input type="email" placeholder="Enter Email Address">
                                    </div>
                                </div>
                                <div class="col-xl-6 col-md-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Phone Number*</label>
                                        <input type="tel" placeholder="Enter Phone Number">
                                    </div>
                                </div>
                                <div class="col-xl-6 col-md-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Organisation Name*</label>
                                        <input type="text" placeholder="Enter Organisation Name">
                                    </div>
                                </div>
                                <div class="col-xl-6 col-md-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Number of Participants</label>
                                        <input type="text" placeholder="e.g. 10–50">
                                    </div>
                                </div>
                                <div class="col-xl-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Preferred Demo Date</label>
                                        <input type="date" id="demo-date" name="demo_date">
                                    </div>
                                </div>
                                <div class="col-xl-6 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Preferred Demo Time</label>
                                        <input type="time" id="demo-time" name="demo_time">
                                    </div>
                                </div>
                                <div class="col-xl-12 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label>Anything specific you'd like to see?</label>
                                        <textarea name="message" id="message" placeholder="Tell us what features matter most to you..."></textarea>
                                    </div>
                                </div>
                                <div class="col-xl-12 mb-24">
                                    <div class="vl-contact-singlebox">
                                        <label id="captcha-label-demo" style="font-weight:600;"></label>
                                        <input type="text" id="captcha-input-demo" placeholder="Enter the answer" autocomplete="off" style="margin-top:8px;">
                                        <p id="captcha-error-demo" style="color:#e53e3e;font-size:14px;margin-top:6px;display:none;">Incorrect answer. Please try again.</p>
                                    </div>
                                </div>
                                <div class="col-xl-12 text-xl-end">
                                    <button type="submit" class="vl-primary-btn-1" style="color:#fff;">Book My Demo <span><img src="../assets/img/icon/vl-arrowupright.svg" alt=""></span></button>
                                </div>
                            </div>
                        </div>
                        </form>
                        <script>
                        (function(){
                            var a, b, answer;
                            function gen(){
                                a = Math.floor(Math.random()*20)+1;
                                b = Math.floor(Math.random()*20)+1;
                                answer = a + b;
                                document.getElementById('captcha-label-demo').textContent = 'Security check: What is ' + a + ' + ' + b + '?';
                                document.getElementById('captcha-input-demo').value = '';
                                document.getElementById('captcha-error-demo').style.display = 'none';
                            }
                            gen();
                            document.getElementById('demo-form').addEventListener('submit', function(e){
                                e.preventDefault();
                                var val = parseInt(document.getElementById('captcha-input-demo').value, 10);
                                if(val !== answer){
                                    document.getElementById('captcha-error-demo').style.display = 'block';
                                    gen();
                                }
                            });
                        })();
                        </script>
                    </div>
                </div>
            </div>
        </section>
        <!-- =========== demo booking area end =========== -->
    </main>

    <div id="global-footer"></div>

    <!-- progress -->
    <div class="paginacontainer">
        <div class="progress-wrap">
            <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
                <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
            </svg>
        </div>
    </div>

    <script src="../assets/js/jquery-3.7.1.min.js"></script>
    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/jquery.magnific-popup.min.js"></script>
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/nice-select.js"></script>
    <script src="../assets/js/aos.js"></script>
    <script src="../assets/js/fontawesome.min.js"></script>
    <script src="../assets/js/plugin.js"></script>
    <script src="../assets/js/gAnim.js"></script>
    <script src="../assets/js/SmoothScroll.js"></script>
    <script src="../assets/js/odometer.min.js"></script>
    <script src="../assets/js/parallaxie.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/includes.js"></script>
</body>
</html>
